services:
  postgres:
    image: postgres:15-alpine
    container_name: sms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sms
      POSTGRES_PASSWORD: sms
      POSTGRES_DB: sms_dev
    ports:
      - "5432:5432"
    volumes:
      - sms-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms -d sms_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sms-postgres-data:
