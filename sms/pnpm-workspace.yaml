packages:
  - "apps/*"
  - "packages/*"

# pnpm >=10 blocks dependency postinstall scripts by default
# (ERR_PNPM_IGNORED_BUILDS). These packages genuinely need theirs:
# Prisma downloads its query engines, bcrypt builds native bindings.
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - bcrypt
  - prisma
